swarm_map_merge:
  ros__parameters:
    robot_map_topic: map
    robot_namespace:
      - scout
      - carrier
      - specialist
    merged_map_topic: /global_map
    world_map_topic: /global_map
    world_frame: map
    merging_rate: 0.5
    discovery_rate: 0.2
    estimation_rate: 0.5

    # Keep initial poses explicit in the rescue formation. This prevents
    # namespace-free discovery from mixing /map topics across robots during
    # startup and gives map_merge a stable transform seed.
    known_init_poses: true
    scout_init_x: 0.0
    scout_init_y: 0.0
    scout_init_yaw: 0.0
    carrier_init_x: -1.8
    carrier_init_y: 0.0
    carrier_init_yaw: 0.0
    specialist_init_x: -3.2
    specialist_init_y: -0.2
    specialist_init_yaw: 0.0
