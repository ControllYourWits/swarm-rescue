slam_toolbox:
  ros__parameters:
    odom_frame:    odom
    map_frame:     map
    base_frame:    scout/base_link
    scan_topic:    /scout/scan
    use_sim_time:  false

    # 定位模式（加载已有地图）
    mode: localization
    map_file_name: /home/robot/maps/disaster_map
    map_start_at_dock: true

    resolution:        0.05
    max_laser_range:   5.5
    transform_publish_period: 0.02
    tf_buffer_duration: 30.0
